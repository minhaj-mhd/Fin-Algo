# MV2 Meta-Model Specification
# -----------------------------
# Controls the capacity ladder, WF fold parameters, and certification thresholds.
# All numeric thresholds here are binding — never edit to make a result pass.

version: mv2
candidate_dir: models/meta_veto_v2
dev_ledger: data/gauntlet/meta/mv2/dev_ledger.jsonl

# G3: primary endpoint is REQUIRED, locked at freeze time, no default.
# The certifier reads this and verifies it matches the frozen candidate's sealed endpoint.
primary_endpoint: v8_upstox_3y_long

# --- DEV Walk-Forward ---
dev_wf:
  min_train_months: 6      # minimum calendar months in each train fold
  test_months: 1           # each fold tests exactly 1 month
  embargo_days: 3          # purge window between train and test

# --- Theta Calibration ---
theta_calibration:
  grid_start: 0.10
  grid_end: 0.90
  grid_step: 0.01
  keep_floor: 0.25         # veto keeping < 25% trades is too aggressive
  keep_ceiling: 0.90       # G2: veto keeping > 90% is a no-op — reject candidate

# --- Capacity Ladder (G4/G5 enforced by dev_run.py) ---
capacity_ladder:
  - rung: 1
    class: logistic
    param_grid:
      C: [0.03, 0.1, 0.3]
    ascent_gate: null      # always runs; mandatory baseline

  - rung: 2
    class: gbm_shallow
    param_grid:
      max_depth: [2, 3]
      n_estimators: [100, 200]
      learning_rate: [0.05]
    ascent_gate:
      requires_rung: 1     # G4: GBM only starts after logistic is logged
      beat_by_bps: null    # no margin required for GBM to run (only for NN)

  - rung: 3
    class: mlp_small
    # Constraints per 2026-06-10 ruling:
    #   sklearn.MLPClassifier (no torch), hidden_layer_sizes <= (32,32),
    #   alpha in {1e-3, 1e-2, 1e-1}, early_stopping=True,
    #   3 seeds (random_state varies), worst-of-3 reported (G5).
    # Note: early_stopping uses an internal random val split inside the train
    # fold — acceptable (never touches the test month); do NOT report internal val score.
    param_grid:
      hidden_layer_sizes: [[16], [32], [16, 16], [32, 32]]
      alpha: [0.001, 0.01, 0.1]
    early_stopping: true
    n_seeds: 3             # G5: must report worst-of-3
    ascent_gate:
      requires_rung: 2           # G4: GBM must be logged first
      gbm_beat_logistic_by_bps: 0.5   # G4: GBM must beat logistic by >= 0.5 bps

# --- Certification Thresholds (elevated — VAULT was exposed once) ---
certification:
  cost_bps: 10.0            # binding statutory cost
  uplift_min_bps: 3.0       # kept vs vetoed uplift
  uplift_min_t: 2.5         # elevated from 2.0 (first build exposed VAULT)
  abs_min_t: 2.5            # kept-net > 0 absolute t-stat (elevated)

# --- M1 Orthogonality Kill-Gate ---
m1_orthogonality:
  min_incremental_ic: 0.005   # at least one qualifying feature must exceed this
  # Qualifying features = everything EXCEPT own_* and model_is_v8/side_is_long
  # (identity one-hots carry no signal). See MV2 spec ruling 2026-06-10.
  excluded_from_gate: [own_score, own_z, own_pct, model_is_v8, side_is_long]
